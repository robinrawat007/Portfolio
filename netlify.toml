[build]
  command = "npm run build"
  publish = ".next"

# Full Next.js (API routes at /api/*). Do not publish `out` — static export forces
# client-side n8n webhooks and triggers CORS failures for Atlas in the browser.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache static assets aggressively on the CDN
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
