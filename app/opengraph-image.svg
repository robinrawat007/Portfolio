<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Robin Singh Rawat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="140" r="220" fill="url(#g)" opacity="0.14"/>
  <circle cx="230" cy="560" r="260" fill="url(#g)" opacity="0.10"/>
  <rect x="80" y="80" width="1040" height="470" rx="40" fill="#0b1224" opacity="0.55" stroke="rgba(255,255,255,0.08)"/>

  <g filter="url(#glow)">
    <text x="120" y="250" font-size="64" font-weight="800"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      fill="#e2e8f0">Robin Singh Rawat</text>
    <text x="120" y="325" font-size="34" font-weight="600"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      fill="rgba(226,232,240,0.85)">AI Integration Developer " Frontend Engineer</text>
    <text x="120" y="395" font-size="28" font-weight="500"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      fill="rgba(148,163,184,0.95)">React " Next.js " Angular " TypeScript " RAG " LLM Interfaces</text>
  </g>

  <g transform="translate(920, 380)">
    <rect x="0" y="0" width="170" height="170" rx="34" fill="rgba(2,6,23,0.9)" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="85" cy="78" r="52" fill="none" stroke="url(#g)" stroke-width="10"/>
    <text x="85" y="94" text-anchor="middle" font-size="46" font-weight="800"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      fill="#e2e8f0">RR</text>
  </g>
</svg>
